<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación 1: Cartografía de la Intersubjetividad</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050508; color: #d4af37; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .contenido { max-width: 800px; width: 100%; padding: 40px; border: 1px solid #d4af37; border-radius: 15px; background: #0d1117; }
        .btn { padding: 10px 20px; border: 1px solid #d4af37; color: #d4af37; background: transparent; cursor: pointer; margin: 5px; }
        .btn:hover { background: #d4af37; color: #000; }
        #feedback { margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="text-align:center; border:1px solid #d4af37; padding:20px; background:#050508;">
        <h3>Identificación Clínica</h3>
        <input type="text" id="nombre-usuario" placeholder="APELLIDO Nombre">
        <button class="btn" onclick="iniciar()">ACEPTAR</button>
    </div>
</div>

<div class="contenido" id="main-content" style="display:none;">
    <h1>Cartografía de la Intersubjetividad</h1>
    <div id="contenedor-evaluacion">
        <h3 id="pregunta-texto">Cargando...</h3>
        <div id="opciones-container"></div>
        <div id="feedback"></div>
        <button id="btn-siguiente" class="btn" style="display:none;">Siguiente</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let user = "";

    async function iniciar() {
        user = document.getElementById('nombre-usuario').value;
        if (!user) return;
        
        // GRABAR EN BASE DE DATOS INMEDIATAMENTE AL INICIAR
        try {
            await db.collection("progreso").doc(user).set({ 
                inicio_estacion_1: new Date().toISOString() 
            }, { merge: true });
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            cargarPregunta();
        } catch (e) {
            alert("Error al conectar con la base de datos");
        }
    }

    const bancoPreguntas = [
        { q: "¿Qué micro-expresión facial del paciente contradice su relato?", o: ["Tensión orbicular", "Relajación bucal", "Parpadeo ausente"], c: 0 },
        { q: "¿Qué fenómeno contratransferencial se activa ante el silencio?", o: ["Vacío", "Euforia", "Rechazo"], c: 0 }
    ];

    let indice = 0;
    function cargarPregunta() {
        const p = bancoPreguntas[indice];
        document.getElementById('pregunta-texto').textContent = p.q;
        document.getElementById('opciones-container').innerHTML = p.o.map((op, i) => `<button class="btn" onclick="validar(${i})">${op}</button>`).join('');
    }

    function validar(i) {
        if(i === bancoPreguntas[indice].c) document.getElementById('feedback').textContent = "Correcto";
        document.getElementById('btn-siguiente').style.display = "block";
    }

    document.getElementById('btn-siguiente').onclick = () => {
        indice++;
        if (indice < bancoPreguntas.length) cargarPregunta();
        else finalizar();
    };

    async function finalizar() {
        await db.collection("progreso").doc(user).update({ completadas: firebase.firestore.FieldValue.arrayUnion(1) });
        window.location.href = "https://drrubenmpereyra-stack.github.io/mapa-global-estaciones/";
    }
</script>
</body>
</html>
