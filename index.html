<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación 1: Cartografía de la Intersubjetividad</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050508; color: #d4af37; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .contenido { max-width: 700px; padding: 40px; border: 1px solid #d4af37; border-radius: 15px; background: #0d1117; text-align: center; }
        .btn { padding: 15px 30px; border: 1px solid #d4af37; color: #d4af37; background: transparent; cursor: pointer; margin: 20px; font-size: 16px; }
        .btn:hover { background: #d4af37; color: #000; }
        video, audio { width: 100%; margin-top: 20px; border: 1px solid #d4af37; }
        .opciones { text-align: left; margin: 20px 0; }
    </style>
</head>
<body>

<div class="contenido">
    <h1>Cartografía de la Intersubjetividad</h1>
    <p>Alianza terapéutica y eje HPA.</p>
    
    <video controls autoplay loop muted playsinline 
           src="https://github.com/drrubenmpereyra-stack/video-trazado-estacion-1/raw/refs/heads/main/video_traazado.mp4">
    </video>
    
    <audio controls 
           src="https://github.com/drrubenmpereyra-stack/audio-estacion-1/raw/refs/heads/main/Audio1.mp4">
    </audio>

    <div class="opciones">
        <h3>¿Qué proceso biológico refleja la sensación de cierre en el pecho?</h3>
        <input type="radio" name="neuro" id="op1" value="0"> <label for="op1">Falla en memoria</label><br>
        <input type="radio" name="neuro" id="op2" value="1"> <label for="op2">Activación eje HPA</label><br>
        <input type="radio" name="neuro" id="op3" value="2"> <label for="op3">Disminución FC</label>
    </div>

    <button id="btn-finalizar" class="btn">Finalizar Estación y Validar</button>
    <br><a href="estacion_integracion_sinaptica.html" style="color: #d4af37;">⬅ Volver al Mapa</a>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const user = localStorage.getItem("usuarioActual") || "INVITADO";

    document.getElementById('btn-finalizar').addEventListener('click', async () => {
        const seleccion = document.querySelector('input[name="neuro"]:checked');
        if (!seleccion) {
            alert("Por favor, selecciona una respuesta antes de finalizar.");
            return;
        }

        try {
            await db.collection("progreso").doc(user).set({ 
                estacion_1: true,
                respuesta_estacion_1: seleccion.value,
                fecha: new Date().toISOString()
            }, { merge: true });
            
            alert("¡Estación completada!");
            window.location.href = "estacion_integracion_sinaptica.html";
        } catch (e) {
            console.error(e);
            alert("Error al guardar en base de datos.");
        }
    });
</script>

</body>
</html>
