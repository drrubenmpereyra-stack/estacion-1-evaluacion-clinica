<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación 1: Cartografía de la Intersubjetividad</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050508; color: #d4af37; font-family: sans-serif; padding: 20px; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; }
        .contenido { display:none; max-width: 800px; margin: auto; border: 1px solid #d4af37; padding: 40px; background: #0d1117; }
        .btn { padding: 10px 20px; border: 1px solid #d4af37; color: #d4af37; background: transparent; cursor: pointer; margin: 5px; }
        video, audio { width: 100%; margin: 20px 0; border: 1px solid #d4af37; }
        #feedback { margin: 15px 0; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="text-align:center; border:1px solid #d4af37; padding:20px;">
        <h3>IDENTIFICACIÓN</h3>
        <input type="text" id="nombre-input" placeholder="APELLIDO Nombre">
        <button class="btn" onclick="registrarInicio()">INGRESAR</button>
    </div>
</div>

<div class="contenido" id="actividad">
    <h1>Cartografía de la Intersubjetividad</h1>
    <video controls src="https://github.com/drrubenmpereyra-stack/video-trazado-estacion-1/raw/refs/heads/main/video_traazado.mp4"></video>
    <audio controls src="https://github.com/drrubenmpereyra-stack/audio-estacion-1/raw/refs/heads/main/Audio1.mp4"></audio>

    <div id="contenedor-evaluacion">
        <h3 id="pregunta-texto"></h3>
        <div id="opciones-container"></div>
        <div id="feedback"></div>
        <button id="btn-siguiente" class="btn" style="display:none;">Siguiente</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let usuarioActual = "";
    let indice = 0;
    let puntaje = 0;

    const bancoPreguntas = [
        { q: "¿Qué micro-expresión facial del paciente contradice su relato?", o: ["Tensión orbicular", "Relajación bucal", "Parpadeo ausente"], c: 0, f: "La disociación entre lo verbal y lo somático es un marcador clínico de defensa." },
        { q: "¿Qué fenómeno contratransferencial se activa ante el silencio?", o: ["Vacío", "Euforia", "Rechazo"], c: 0, f: "El vacío es la respuesta emocional del analista a la desconexión del paciente." },
        { q: "¿Qué lugar ocupa el fonema /s/ en la estructura del deseo?", o: ["Contención", "Irrupción", "Silencio"], c: 0, f: "La repetición actúa como un escudo ante la angustia del Ello." },
        { q: "¿Cuál es el correlato neurobiológico de la aceleración del audio?", o: ["Activación simpática", "Sedación", "Homeostasis"], c: 0, f: "La desregulación autónoma es la vía regia del afecto reprimido." },
        { q: "¿Cómo definirías la alianza en este corte?", o: ["Fragilizada", "Sólida", "Indiferente"], c: 0, f: "Una alianza sostenida en la resistencia es un pacto defensivo." },
        { q: "¿Qué indica el cierre en el pecho?", o: ["Clausura Super-yoica", "Distensión", "Apertura"], c: 0, f: "El cuerpo siempre habla lo que el sujeto se niega a significar." },
        { q: "¿Qué significa la interrupción del flujo a los 2:00?", o: ["Clivaje del sujeto", "Continuidad", "Fatiga"], c: 0, f: "La interrupción marca la irrupción de la pulsión." },
        { q: "¿Qué transferencia opera en la demanda del paciente?", o: ["Especular", "Simbólica", "Imaginaría"], c: 0, f: "El paciente busca una imagen de completud que le es ajena." },
        { q: "¿Cuál es la función del silencio del analista?", o: ["Corte simbólico", "Castigo", "Olvido"], c: 0, f: "Permite que el sujeto se escuche en su propia escisión." },
        { q: "¿Qué rasgo digital resuena con la clínica?", o: ["Fragmentación", "Fluidez", "Nitidez"], c: 0, f: "La forma del medio es homóloga a la estructura del psiquismo." }
    ];

    async function registrarInicio() {
        usuarioActual = document.getElementById('nombre-input').value;
        if (!usuarioActual) return;
        await db.collection("progreso").doc(usuarioActual).set({ nombre: usuarioActual, inicio: new Date().toISOString() }, { merge: true });
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('actividad').style.display = 'block';
        cargarPregunta();
    }

    function cargarPregunta() {
        const p = bancoPreguntas[indice];
        document.getElementById('pregunta-texto').textContent = p.q;
        document.getElementById('opciones-container').innerHTML = p.o.map((op, i) => `<button class="btn" onclick="validar(${i})">${op}</button>`).join('');
        document.getElementById('feedback').textContent = "";
        document.getElementById('btn-siguiente').style.display = "none";
    }

    function validar(i) {
        const p = bancoPreguntas[indice];
        if (i === p.c) { puntaje++; document.getElementById('feedback').textContent = "Correcto: " + p.f; }
        else { document.getElementById('feedback').textContent = "Incorrecto: " + p.f; }
        document.getElementById('btn-siguiente').style.display = "inline-block";
    }

    document.getElementById('btn-siguiente').onclick = () => {
        indice++;
        if (indice < bancoPreguntas.length) cargarPregunta();
        else {
            document.getElementById('contenedor-evaluacion').innerHTML = `<h3>Puntaje Final: ${puntaje}/10</h3>
                <button class="btn" onclick="guardarFinal()">GUARDAR NOTA</button>
                <button class="btn" onclick="window.location.href='https://drrubenmpereyra-stack.github.io/mapa-global-estaciones/'">CERRAR</button>`;
        }
    };

    async function guardarFinal() {
        await db.collection("progreso").doc(usuarioActual).set({ estacion_1_nota: puntaje, estacion_1_finalizada: true }, { merge: true });
        alert("Nota " + puntaje + "/10 guardada para " + usuarioActual);
    }
</script>
</body>
</html>
